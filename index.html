<script>
  document.addEventListener('DOMContentLoaded', function(){
    var numero = '5521996921402';

    function copyTextSafe(text){
      if (window.isSecureContext && navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){
          alert('Dados copiados! Cole no ConfirmAdv/CNA quando quiser.');
        }).catch(function(){
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text){
      try{
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly','');
        ta.style.position = 'fixed';
        ta.style.top = '-1000px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        var ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok){
          alert('Dados copiados! Cole no ConfirmAdv/CNA quando quiser.');
          return;
        }
      }catch(e){}
      window.prompt('Copie os dados com CTRL+C / ⌘C e depois ENTER:', text);
    }

    // --- Função que abre o WhatsApp sem fechar a landing ---
    function abrirWhatsApp(msg, utm){
      var url = 'https://wa.me/' + numero + '?text=' + encodeURIComponent(msg);

      try{
        if (window.gtag){
          // Dispara a CONVERSÃO do Google Ads com callback
          gtag('event', 'conversion', {
            'send_to': 'AW-17715024874/bMoLCLi_yr8bEOqnI_9B',
            'event_callback': function(){
              // Abre o WhatsApp em nova aba/janela
              window.open(url, '_blank');
            }
          });

          // Segurança: se por algum motivo o callback não rodar,
          // abre o WhatsApp depois de 1 segundo mesmo assim.
          setTimeout(function(){
            window.open(url, '_blank');
          }, 1000);
        } else {
          // Se o gtag não estiver disponível, apenas abre o WhatsApp
          window.open(url, '_blank');
        }
      }catch(e){
        window.open(url, '_blank');
      }
    }

    /* CLICKS NO WHATSAPP – ENGAGEMENT + CONVERSÃO */
    var waLinks = document.querySelectorAll('.wa');
    waLinks.forEach(function(el){
      el.addEventListener('click', function(e){
        e.preventDefault();
        var msg = el.getAttribute('data-msg') || 'Olá, Dr. Rafael.';
        var utm = el.getAttribute('data-utm') || 'na';

        // Evento de engajamento (para GA4)
        try{
          if (window.gtag){
            gtag('event', 'whatsapp_click', {
              event_category: 'engagement',
              event_label: utm,
              value: 1
            });
          }
        }catch(err){}

        // Chama função que dispara conversão e abre o WhatsApp
        abrirWhatsApp(msg, utm);
      }, false);
    });

    // --- Botão de copiar OAB ---
    var copyBtn = document.getElementById('copy-oab-btn');
    if (copyBtn){
      copyBtn.addEventListener('click', function(ev){
        ev.preventDefault();
        copyTextSafe('Rafael Toledo da Silva Duarte - OAB/RJ 227191');
        try{
          if (window.gtag){
            gtag('event', 'copy_oab');
          }
        }catch(err){}
      }, false);
    }

    // --- Controles do vídeo (igual antes) ---
    var v = document.getElementById('introVideo');
    var unmute = document.getElementById('unmuteBtn');
    var restart = document.getElementById('restartBtn');
    var back10 = document.getElementById('back10Btn');
    var playBtn = document.getElementById('playPauseBtn');
    var fwd10 = document.getElementById('fwd10Btn');
    var seek = document.getElementById('seekBar');
    var fallback = document.getElementById('videoFallback');

    if (v){
      function sync(){
        try{
          if (seek && v.duration){
            seek.value = (v.currentTime / v.duration) * 100;
          }
          if (playBtn){
            if (v.paused){
              playBtn.textContent = '▶️';
              playBtn.setAttribute('aria-label', 'Reproduzir vídeo');
            } else {
              playBtn.textContent = '⏸️';
              playBtn.setAttribute('aria-label', 'Pausar vídeo');
            }
          }
        }catch(e){}
      }

      function seekBy(sec){
        try{
          var t = v.currentTime + sec;
          if (v.duration){
            if (t < 0){ t = 0; }
            if (t > v.duration){ t = v.duration; }
          }
          v.currentTime = t;
          sync();
        }catch(e){}
      }

      try{
        v.muted = true;
        var p = v.play();
        if (p && p.catch){ p.catch(function(){}); }
      }catch(e){}

      v.addEventListener('timeupdate', sync);
      v.addEventListener('loadedmetadata', sync);

      if (seek){
        seek.addEventListener('input', function(){
          if (v.duration){
            v.currentTime = (seek.value / 100) * v.duration;
            sync();
          }
        });
      }

      if (restart){
        restart.addEventListener('click', function(){
          try{
            v.currentTime = 0;
            var p2 = v.play();
            if (p2 && p2.catch){ p2.catch(function(){}); }
            sync();
          }catch(e){}
        });
      }

      if (back10){
        back10.addEventListener('click', function(){
          seekBy(-10);
        });
      }

      if (fwd10){
        fwd10.addEventListener('click', function(){
          seekBy(10);
        });
      }

      if (playBtn){
        playBtn.addEventListener('click', function(){
          try{
            if (v.paused){
              var p3 = v.play();
              if (p3 && p3.catch){ p3.catch(function(){}); }
            }else{
              v.pause();
            }
            sync();
          }catch(e){}
        });
      }

      if (unmute){
        unmute.addEventListener('click', function(){
          try{
            v.muted = false;
            var p4 = v.play();
            if (p4 && p4.catch){ p4.catch(function(){}); }
            unmute.hidden = true;
          }catch(e){}
        });
      }

      v.addEventListener('error', function(){
        if (fallback){
          fallback.style.display = 'block';
        }
      });
    }
  });
</script>
